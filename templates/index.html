<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Web Scraper Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <style>
        :root {
            --primary: #6366F1;
            --primary-hover: #4F46E5;
            --secondary: #10B981;
            --dark: #111827;
            --muted: #6B7280;
            --card-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        /* ---------- GLOBAL ---------- */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--dark);
            background:
                radial-gradient(circle at top left, #6366F1 0%, transparent 30%),
                radial-gradient(circle at bottom right, #10B981 0%, transparent 30%),
                linear-gradient(135deg, #EEF2FF 0%, #E0E7FF 100%);
            background-attachment: fixed;
            animation: bgMove 12s ease infinite alternate;

            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        @keyframes bgMove {
            0% {
                background-position: left top, right bottom;
            }

            100% {
                background-position: right top, left bottom;
            }
        }

        /* ---------- HEADER ---------- */

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 1s;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .header h1 span {
            background: linear-gradient(90deg, #6366F1, #10B981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--muted);
            font-size: 1.1rem;
        }

        /* ---------- SEARCH BOX ---------- */

        .search-container {
            width: 100%;
            max-width: 900px;

            background: var(--card-bg);
            backdrop-filter: blur(18px);

            border: 1px solid var(--glass-border);

            border-radius: 24px;

            padding: 30px;

            box-shadow:
                0 10px 30px rgba(0, 0, 0, 0.08),
                inset 0 1px 1px rgba(255, 255, 255, 0.5);

            animation: fadeInUp 1s;
        }

        /* ---------- INPUT ---------- */

        .input-wrapper {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        input {
            flex: 1;
            padding: 18px 22px;

            border: none;
            outline: none;

            border-radius: 16px;

            background: white;

            font-size: 1rem;

            transition: 0.3s ease;

            box-shadow:
                inset 0 2px 4px rgba(0, 0, 0, 0.03);
        }

        input:focus {
            transform: translateY(-2px);

            box-shadow:
                0 0 0 5px rgba(99, 102, 241, 0.15),
                0 10px 25px rgba(99, 102, 241, 0.15);
        }

        /* ---------- SELECT ---------- */

        select {
            padding: 15px 18px;

            border-radius: 14px;

            border: none;

            background: white;

            font-weight: 600;

            cursor: pointer;

            transition: 0.3s;
        }

        select:hover {
            transform: translateY(-2px);
        }

        /* ---------- BUTTON ---------- */

        .scrape-btn {
            border: none;

            padding: 16px 28px;

            border-radius: 16px;

            background: linear-gradient(135deg, #6366F1, #4F46E5);

            color: white;

            font-weight: 700;

            cursor: pointer;

            display: flex;
            align-items: center;
            gap: 8px;

            transition: all 0.3s ease;

            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.25);
        }

        .scrape-btn:hover {
            transform: translateY(-4px) scale(1.03);

            box-shadow:
                0 15px 30px rgba(99, 102, 241, 0.35);
        }

        .scrape-btn:active {
            transform: scale(0.98);
        }

        /* ---------- LOADER ---------- */

        .loader-container {
            display: none;
            margin: 40px 0;
            text-align: center;
        }

        .spinner {
            width: 55px;
            height: 55px;

            border: 5px solid rgba(99, 102, 241, 0.15);
            border-top-color: #6366F1;

            border-radius: 50%;

            margin: auto;

            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loader-text {
            margin-top: 18px;
            font-weight: 600;
            color: var(--muted);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.4;
            }

            50% {
                opacity: 1;
            }
        }

        /* ---------- RESULTS ---------- */

        #results-section {
            width: 100%;
            max-width: 900px;

            margin-top: 30px;

            display: none;

            animation: fadeInUp 0.8s;
        }

        /* ---------- SUMMARY ---------- */

        .summary-card {
            background: rgba(255, 255, 255, 0.75);

            backdrop-filter: blur(18px);

            border: 1px solid rgba(255, 255, 255, 0.4);

            border-radius: 24px;

            padding: 35px;

            margin-bottom: 30px;

            box-shadow:
                0 10px 35px rgba(0, 0, 0, 0.08);
        }

        .summary-title {
            font-size: 1.5rem;
            font-weight: 700;

            display: flex;
            align-items: center;
            gap: 10px;

            margin-bottom: 18px;

            color: #4F46E5;
        }

        .summary-text {
            font-size: 1.08rem;
            line-height: 1.9;
            color: #374151;
        }

        /* ---------- SECTION ---------- */

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #6B7280;

            margin-bottom: 20px;
        }

        /* ---------- RESULT CARDS ---------- */

        .result-item {
            background: rgba(255, 255, 255, 0.82);

            backdrop-filter: blur(12px);

            border: 1px solid rgba(255, 255, 255, 0.5);

            border-radius: 20px;

            padding: 24px;

            margin-bottom: 18px;

            cursor: pointer;

            transition: all 0.35s ease;

            position: relative;

            overflow: hidden;
        }

        .result-item::before {
            content: "";

            position: absolute;
            inset: 0;

            background: linear-gradient(120deg,
                    transparent,
                    rgba(255, 255, 255, 0.4),
                    transparent);

            transform: translateX(-100%);
            transition: 0.8s;
        }

        .result-item:hover::before {
            transform: translateX(100%);
        }

        .result-item:hover {
            transform: translateY(-6px);

            box-shadow:
                0 20px 40px rgba(0, 0, 0, 0.08);
        }

        /* ---------- RESULT TITLE ---------- */

        .result-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 10px;

            color: #111827;
        }

        .result-link {
            color: #4F46E5;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .result-link:hover {
            text-decoration: underline;
        }

        .result-preview {
            margin-top: 10px;
            color: #4B5563;
            line-height: 1.7;
        }

        /* ---------- BUTTONS ---------- */

        .download-btn {
            border: none;

            padding: 12px 20px;

            border-radius: 14px;

            background: linear-gradient(135deg, #10B981, #059669);

            color: white;

            font-weight: 700;

            cursor: pointer;

            transition: 0.3s;
        }

        .download-btn:hover {
            transform: translateY(-3px);

            box-shadow:
                0 12px 25px rgba(16, 185, 129, 0.3);
        }

        /* ---------- CONTROLS ---------- */

        .controls-bar {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-bottom: 25px;
        }

        /* ---------- ERROR ---------- */

        .error-message {
            display: none;

            margin-top: 18px;

            background: #FEE2E2;

            color: #B91C1C;

            padding: 15px 18px;

            border-radius: 14px;

            font-weight: 600;
        }

        /* ---------- BACK BUTTON ---------- */

        .back-btn {
            margin-top: 20px;

            background: #111827;

            color: white;

            border: none;

            padding: 12px 20px;

            border-radius: 14px;

            cursor: pointer;

            font-weight: 600;

            transition: 0.3s;
        }

        .back-btn:hover {
            transform: translateY(-2px);

            background: #1F2937;
        }

        /* ---------- MOBILE ---------- */

        @media(max-width:768px) {

            .input-wrapper {
                flex-direction: column;
            }

            .scrape-btn {
                width: 100%;
                justify-content: center;
            }

            .controls-bar {
                flex-direction: column;
            }

            .header h1 {
                font-size: 2.2rem;
            }

            .summary-card {
                padding: 24px;
            }

        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Smart <span>Web Scraper</span></h1>
        <p>Enter a URL, keyword, or sentence to extract intelligent insights.</p>
    </div>

    <div class="search-container">
        <div class="input-wrapper">
            <select id="engine" style="max-width: 150px; font-weight: bold; color: var(--primary);">
                <option value="bing">Bing</option>
                <option value="serpapi">SerpAPI</option>
                <option value="tavily">AI Search</option>
            </select>
            <input type="text" id="query" placeholder="e.g., https://wikipedia.org OR 'Latest tech news'"
                autocomplete="off" onkeypress="handleKeyPress(event)">
            <button class="scrape-btn" onclick="scrape()">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
                Analyze
            </button>
        </div>
        <div id="error-message" class="error-message"></div>
    </div>

    <div class="loader-container" id="loader">
        <div class="spinner"></div>
        <div class="loader-text">Analyzing the web and generating insights...</div>
    </div>

    <div id="results-section">
        <div class="controls-bar">
            <select id="format">
                <option value="excel">Excel (.xlsx)</option>
                <option value="word">Word (.docx)</option>
                <option value="json">JSON (.json)</option>
            </select>
            <button class="download-btn" onclick="downloadData()">
                ↓ Download Report
            </button>
        </div>

        <div class="summary-card">
            <h3 class="summary-title">
                ✨ AI Generated Summary
            </h3>
            <p class="summary-text" id="summary-content"></p>
        </div>

        <h4 class="section-title">🔗 Source Materials Extracted</h4>
        <div id="data-list"></div>
    </div>

    <script>
        let currentType = "normal";
        let currentData = [];
        let currentSummary = "";
        let categoryName = "";
        let categoryDescription = "";
        let officialUrl = "";

        function handleKeyPress(e) {
            if (e.key === 'Enter') scrape();
        }

        async function scrape() {
            const queryInput = document.getElementById("query");
            const engineSelect = document.getElementById("engine");
            const query = queryInput.value.trim();
            const engine = engineSelect.value;

            const loader = document.getElementById("loader");
            const errorBox = document.getElementById("error-message");
            const resultsSection = document.getElementById("results-section");

            errorBox.style.display = "none";
            resultsSection.style.display = "none";

            if (!query) {
                errorBox.textContent = "Please enter a URL, keyword, or question.";
                errorBox.style.display = "block";
                return;
            }

            loader.style.display = "block";

            try {
                const response = await fetch("/scrape", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ query, engine })
                });

                const data = await response.json();
                loader.style.display = "none";

                if (!response.ok || data.error) {
                    throw new Error(data.error || "Scraping failed");
                }

                currentData = data.results || [];
                currentSummary = data.summary || "";

                // 🔥 IMPORTANT
                displayResults(data.type || "normal");


            } catch (err) {
                loader.style.display = "none";
                errorBox.textContent = err.message;
                errorBox.style.display = "block";
            }
        }

        function displayResults(type = "normal") {

            const resultsSection = document.getElementById("results-section");
            const summaryContent = document.getElementById("summary-content");
            const dataList = document.getElementById("data-list");

                    border-radius:12px;
                    cursor:pointer;
                    font-weight:600;
                    transition:0.2s;
                "
                onmouseover="this.style.background='#DDE5FF'"
                onmouseout="this.style.background='#EEF2FF'"

            </div>
        `).join("");

        async function downloadData() {
            const format = document.getElementById("format").value;

            try {
                const response = await fetch("/download", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        results: currentData,
                        summary: currentSummary,
                        format: format
                    })
                });

                if (!response.ok) throw new Error("Download failed");

                const blob = await response.blob();
                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);

                const extMap = {
                    excel: "xlsx",
                    word: "docx",
                    json: "json"
                };

                a.download = `scraped_report.${extMap[format]}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

            } catch (err) {
                alert("Download error: " + err.message);
            }
        }
